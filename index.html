<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Your Photographs</title>
  <style>
    :root {
      --bg: #fafafa;
      --fg: #222;
      --muted: #888;
      --border: #e5e5e5;
      --card: #ffffff;
      --accent: #2266dd;
    }
    * { box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      margin: 0;
      background: var(--bg);
      color: var(--fg);
    }
    header {
      padding: 1.5rem 2rem 1.25rem;
      border-bottom: 1px solid var(--border);
      background: var(--card);
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 1rem;
    }
    header h1 {
      margin: 0;
      font-size: 1.5rem;
      font-weight: 600;
      letter-spacing: -0.01em;
    }
    header a.signout {
      color: var(--muted);
      font-size: 0.9rem;
      text-decoration: none;
    }
    header a.signout:hover { color: var(--fg); text-decoration: underline; }

    .nav {
      padding: 0 2rem;
      display: flex;
      gap: 0.25rem;
      border-bottom: 1px solid var(--border);
      background: var(--card);
    }
    .nav-link {
      padding: 0.7rem 1rem;
      color: var(--muted);
      text-decoration: none;
      font-size: 0.9rem;
      border-bottom: 2px solid transparent;
      margin-bottom: -1px;
    }
    .nav-link:hover { color: var(--fg); }
    .nav-link.active {
      color: var(--accent);
      border-bottom-color: var(--accent);
    }

    .toolbar {
      padding: 0.75rem 2rem;
      display: flex;
      align-items: center;
      gap: 1rem;
      border-bottom: 1px solid var(--border);
      background: var(--card);
    }
    .upload-btn {
      display: inline-flex;
      align-items: center;
      padding: 0.45rem 1rem;
      background: var(--accent);
      color: white;
      border: none;
      border-radius: 6px;
      font-size: 0.9rem;
      font-weight: 500;
      cursor: pointer;
    }
    .upload-btn:hover { filter: brightness(1.1); }
    .upload-btn:disabled {
      filter: grayscale(0.6);
      cursor: not-allowed;
    }
    .upload-hint {
      color: var(--muted);
      font-size: 0.9rem;
    }
    .status {
      margin-left: auto;
      color: var(--muted);
      font-size: 0.9rem;
    }
    .status a {
      color: var(--accent);
      text-decoration: none;
    }
    .status a:hover { text-decoration: underline; }

    .upload-mode, .select-mode {
      display: flex;
      align-items: center;
      gap: 1rem;
      width: 100%;
    }
    .select-mode { display: none; }
    body.selecting .upload-mode { display: none; }
    body.selecting .select-mode { display: flex; }

    .select-count {
      font-size: 0.9rem;
      color: var(--fg);
    }
    .select-count strong {
      font-variant-numeric: tabular-nums;
    }
    .link-btn {
      background: none;
      border: none;
      color: var(--muted);
      cursor: pointer;
      font-size: 0.9rem;
      padding: 0.45rem 0.5rem;
      font-family: inherit;
    }
    .link-btn:hover { color: var(--fg); }

    main { padding: 2rem; min-height: 50vh; }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(330px, 1fr));
      gap: 1rem;
    }
    .photo-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 6px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      color: inherit;
      text-decoration: none;
      position: relative;
    }
    .photo-card:hover { border-color: var(--accent); }
    .photo-card.selected {
      border-color: var(--accent);
      box-shadow: 0 0 0 1px var(--accent);
    }
    .photo-card .thumb {
      aspect-ratio: 1;
      width: 100%;
      overflow: hidden;
      position: relative;
    }
    .radio {
      position: absolute;
      top: 0.5rem;
      right: 0.5rem;
      width: 1.5rem;
      height: 1.5rem;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.92);
      border: 2px solid #bbb;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      opacity: 0;
      transition: opacity 0.1s;
      z-index: 2;
    }
    .radio svg {
      width: 0.9rem;
      height: 0.9rem;
      color: white;
      visibility: hidden;
    }
    .photo-card:hover .radio,
    body.selecting .radio {
      opacity: 1;
    }
    .photo-card.selected .radio {
      background: var(--accent);
      border-color: var(--accent);
    }
    .photo-card.selected .radio svg { visibility: visible; }
    .photo-card img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }
    .photo-meta {
      padding: 0.4rem 0.55rem;
      font-size: 0.72rem;
      color: var(--muted);
      display: flex;
      justify-content: space-between;
      gap: 0.5rem;
      font-variant-numeric: tabular-nums;
    }
    .photo-meta .counts { white-space: nowrap; }
    .empty {
      color: var(--muted);
      font-style: italic;
      padding: 4rem 1rem;
      text-align: center;
    }

    .group + .group { margin-top: 2.5rem; }
    .group-date {
      margin: 0 0 1rem;
      font-size: 1rem;
      font-weight: 600;
      color: var(--fg);
      font-variant-numeric: tabular-nums;
      border-bottom: 1px solid var(--border);
      padding-bottom: 0.5rem;
    }

    .drop-overlay {
      position: fixed;
      inset: 0;
      background: rgba(34, 102, 221, 0.08);
      border: 4px dashed var(--accent);
      display: flex;
      align-items: center;
      justify-content: center;
      pointer-events: none;
      z-index: 100;
      visibility: hidden;
    }
    .drop-overlay.visible { visibility: visible; }
    .drop-overlay span {
      background: var(--card);
      padding: 1rem 2rem;
      border-radius: 8px;
      font-size: 1.2rem;
      color: var(--accent);
    }

    .progress {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      height: 3px;
      background: rgba(34, 102, 221, 0.15);
      z-index: 150;
      visibility: hidden;
    }
    .progress.active { visibility: visible; }
    .progress-fill {
      height: 100%;
      width: 0%;
      background: var(--accent);
      transition: width 0.2s ease;
    }

    .modal-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.35);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 200;
      visibility: hidden;
    }
    .modal-backdrop.visible { visibility: visible; }
    .modal {
      background: var(--card);
      border-radius: 8px;
      padding: 1.5rem;
      width: min(440px, 92vw);
      max-height: 80vh;
      display: flex;
      flex-direction: column;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.15);
    }
    .modal h2 {
      margin: 0 0 1rem;
      font-size: 1.1rem;
      font-weight: 600;
    }
    .album-list {
      list-style: none;
      margin: 0;
      padding: 0;
      overflow-y: auto;
      flex: 1;
    }
    .album-row {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      padding: 0.5rem;
      border-radius: 6px;
      cursor: pointer;
    }
    .album-row:hover { background: var(--bg); }
    .album-row-cover {
      width: 48px;
      height: 48px;
      border-radius: 4px;
      background: #ececec;
      flex-shrink: 0;
      overflow: hidden;
    }
    .album-row-cover img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }
    .album-row-meta { flex: 1; min-width: 0; }
    .album-row-title {
      font-size: 0.95rem;
      color: var(--fg);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .album-row-views {
      font-size: 0.75rem;
      color: var(--muted);
      font-variant-numeric: tabular-nums;
    }
    .modal-loading, .modal-empty {
      padding: 1.5rem 0.5rem;
      text-align: center;
      color: var(--muted);
      font-size: 0.9rem;
    }
    .modal-empty { font-style: italic; }
    .modal-error {
      margin-top: 0.5rem;
      color: #b03030;
      font-size: 0.85rem;
      min-height: 1em;
    }
    .modal-actions {
      margin-top: 1rem;
      display: flex;
      justify-content: flex-end;
      gap: 0.5rem;
    }
    .modal-actions button {
      padding: 0.45rem 1rem;
      font-size: 0.9rem;
      border-radius: 6px;
      cursor: pointer;
      font-family: inherit;
    }
    .modal-actions .cancel {
      background: var(--card);
      border: 1px solid var(--border);
      color: var(--fg);
    }
    .modal-actions .cancel:hover { background: var(--bg); }
  </style>
</head>
<body>
  <header>
    <h1>Your Photographs</h1>
    <a class="signout" href="/logout">Sign out</a>
  </header>
  <nav class="nav">
    <a class="nav-link active" href="/">All Photos</a>
    <a class="nav-link" href="/albums">Albums</a>
  </nav>
  <div class="toolbar">
    <div id="upload-mode-bar" class="upload-mode">
      <button id="upload-btn" class="upload-btn" type="button">Upload photos</button>
      <span class="upload-hint">or drag photos anywhere on this page</span>
      <span id="status" class="status"></span>
      <input id="file-input" type="file" accept="image/jpeg,image/png,image/webp" multiple hidden>
    </div>
    <div id="select-mode-bar" class="select-mode">
      <span class="select-count"><strong id="select-count">0</strong> selected</span>
      <button id="add-to-album-btn" class="upload-btn" type="button" disabled>Add to album</button>
      <button id="cancel-select-btn" class="link-btn" type="button">Cancel</button>
    </div>
  </div>
  <main>
    <div id="groups" hidden></div>
    <div id="empty" class="empty" hidden>No photos yet.</div>
    <div id="loading" class="empty">Loading…</div>
  </main>
  <div id="drop-overlay" class="drop-overlay">
    <span>Drop to upload</span>
  </div>
  <div id="progress" class="progress"><div id="progress-fill" class="progress-fill"></div></div>

  <div id="album-modal-backdrop" class="modal-backdrop" role="dialog" aria-modal="true" aria-labelledby="album-modal-title">
    <div class="modal">
      <h2 id="album-modal-title">Add to album</h2>
      <div id="album-modal-loading" class="modal-loading">Loading…</div>
      <div id="album-modal-empty" class="modal-empty" hidden>No albums yet — create one on the Albums page.</div>
      <ul id="album-modal-list" class="album-list" hidden></ul>
      <div id="album-modal-error" class="modal-error"></div>
      <div class="modal-actions">
        <button type="button" class="cancel" id="album-modal-cancel">Cancel</button>
      </div>
    </div>
  </div>

  <script src="/static/uploads.js"></script>
  <script>
    const groupsEl = document.getElementById("groups");
    const empty = document.getElementById("empty");
    const loading = document.getElementById("loading");
    const statusEl = document.getElementById("status");
    const uploadBtn = document.getElementById("upload-btn");
    const fileInput = document.getElementById("file-input");
    const dropOverlay = document.getElementById("drop-overlay");
    const progressEl = document.getElementById("progress");
    const progressFillEl = document.getElementById("progress-fill");

    function updateProgress({ done, total }) {
      progressEl.classList.add("active");
      const pct = total > 0 ? Math.round((done / total) * 100) : 0;
      progressFillEl.style.width = `${pct}%`;
    }
    function hideProgress() {
      progressEl.classList.remove("active");
      progressFillEl.style.width = "0%";
    }

    const selectCountEl = document.getElementById("select-count");
    const addToAlbumBtn = document.getElementById("add-to-album-btn");
    const cancelSelectBtn = document.getElementById("cancel-select-btn");
    const albumModalBackdrop = document.getElementById("album-modal-backdrop");
    const albumModalLoading = document.getElementById("album-modal-loading");
    const albumModalEmpty = document.getElementById("album-modal-empty");
    const albumModalList = document.getElementById("album-modal-list");
    const albumModalError = document.getElementById("album-modal-error");
    const albumModalCancel = document.getElementById("album-modal-cancel");

    let knownPhotoIds = new Set();
    let selectionMode = false;
    const selectedIds = new Set();

    function pluralize(n, word) { return `${n} ${word}${n === 1 ? "" : "s"}`; }

    function updateSelectionUI() {
      for (const card of document.querySelectorAll(".photo-card")) {
        const pid = card.dataset.photoId;
        if (selectedIds.has(pid)) card.classList.add("selected");
        else card.classList.remove("selected");
      }
      selectCountEl.textContent = String(selectedIds.size);
      addToAlbumBtn.disabled = selectedIds.size === 0;
    }

    function enterSelectionMode() {
      selectionMode = true;
      document.body.classList.add("selecting");
    }

    function exitSelectionMode() {
      selectionMode = false;
      selectedIds.clear();
      document.body.classList.remove("selecting");
      updateSelectionUI();
    }

    function toggleSelection(photoId) {
      if (selectedIds.has(photoId)) selectedIds.delete(photoId);
      else selectedIds.add(photoId);
      updateSelectionUI();
    }

    cancelSelectBtn.addEventListener("click", exitSelectionMode);

    function setStatus(text) { statusEl.textContent = text || ""; }

    function takenDateParts(photo) {
      const d = new Date((photo.taken_at || photo.uploaded_at) * 1000);
      const y = d.getFullYear();
      const m = String(d.getMonth() + 1).padStart(2, "0");
      const day = String(d.getDate()).padStart(2, "0");
      const hh = String(d.getHours()).padStart(2, "0");
      const mm = String(d.getMinutes()).padStart(2, "0");
      return { date: `${y}-${m}-${day}`, time: `${hh}:${mm}` };
    }

    function takenDateKey(photo) {
      return takenDateParts(photo).date;
    }

    function buildPhotoCard(photo) {
      const card = document.createElement("a");
      card.className = "photo-card";
      card.href = `/photo/${photo.photo_id}?from=${encodeURIComponent("/")}`;
      card.dataset.photoId = photo.photo_id;

      card.addEventListener("click", (e) => {
        if (selectionMode) {
          e.preventDefault();
          toggleSelection(photo.photo_id);
        }
      });

      const thumb = document.createElement("div");
      thumb.className = "thumb";

      const radio = document.createElement("span");
      radio.className = "radio";
      radio.setAttribute("aria-label", "Select photo");
      radio.innerHTML = '<svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="3.5 8.5 6.8 11.5 12.5 5"/></svg>';
      radio.addEventListener("click", (e) => {
        e.preventDefault();
        e.stopPropagation();
        if (!selectionMode) enterSelectionMode();
        toggleSelection(photo.photo_id);
      });
      thumb.appendChild(radio);

      const img = document.createElement("img");
      img.src = photo.medium_url;
      img.alt = "";
      img.loading = "lazy";
      thumb.appendChild(img);
      card.appendChild(thumb);

      const meta = document.createElement("div");
      meta.className = "photo-meta";
      const { date, time } = takenDateParts(photo);
      const taken = document.createElement("span");
      taken.textContent = `${date} ${time}`;
      const counts = document.createElement("span");
      counts.className = "counts";
      counts.textContent = `${photo.view_count ?? 0} views · ${photo.download_count ?? 0} dl`;
      meta.appendChild(taken);
      meta.appendChild(counts);
      card.appendChild(meta);

      return card;
    }

    function renderPhotos(photos) {
      knownPhotoIds = new Set(photos.map(p => p.photo_id));
      loading.hidden = true;
      groupsEl.innerHTML = "";
      if (!photos.length) {
        empty.hidden = false;
        groupsEl.hidden = true;
        return;
      }
      empty.hidden = true;
      groupsEl.hidden = false;

      let currentKey = null;
      let currentGrid = null;
      for (const p of photos) {
        const key = takenDateKey(p);
        if (key !== currentKey) {
          currentKey = key;
          const section = document.createElement("section");
          section.className = "group";
          const heading = document.createElement("h2");
          heading.className = "group-date";
          heading.textContent = key;
          currentGrid = document.createElement("div");
          currentGrid.className = "grid";
          section.appendChild(heading);
          section.appendChild(currentGrid);
          groupsEl.appendChild(section);
        }
        currentGrid.appendChild(buildPhotoCard(p));
      }
      updateSelectionUI();
    }

    async function fetchPhotos() {
      const resp = await fetch("/api/photos");
      if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
      const data = await resp.json();
      return data.photos || [];
    }

    async function refreshGallery() {
      try {
        renderPhotos(await fetchPhotos());
      } catch (err) {
        loading.textContent = `Failed to load photos: ${err.message}`;
      }
    }

    refreshGallery();

    uploadBtn.addEventListener("click", () => fileInput.click());
    fileInput.addEventListener("change", () => {
      if (fileInput.files.length) handleFiles(Array.from(fileInput.files));
      fileInput.value = "";
    });

    let dragDepth = 0;
    function isFileDrag(e) {
      return e.dataTransfer && Array.from(e.dataTransfer.types || []).includes("Files");
    }

    window.addEventListener("dragenter", (e) => {
      if (!isFileDrag(e)) return;
      dragDepth++;
      dropOverlay.classList.add("visible");
      e.preventDefault();
    });
    window.addEventListener("dragleave", () => {
      dragDepth = Math.max(0, dragDepth - 1);
      if (dragDepth === 0) dropOverlay.classList.remove("visible");
    });
    window.addEventListener("dragover", (e) => {
      if (isFileDrag(e)) e.preventDefault();
    });
    window.addEventListener("drop", (e) => {
      dragDepth = 0;
      dropOverlay.classList.remove("visible");
      if (!isFileDrag(e)) return;
      e.preventDefault();
      const files = Array.from(e.dataTransfer?.files || []);
      if (files.length) handleFiles(files);
    });

    async function handleFiles(files) {
      try {
        const result = await PhotoUploads.uploadFiles(files, {
          onStatus: setStatus,
          onProgress: updateProgress,
        });
        if (result.processed.length > 0) await refreshGallery();
      } finally {
        hideProgress();
      }
    }

    function isAlbumModalOpen() {
      return albumModalBackdrop.classList.contains("visible");
    }

    function closeAlbumModal() {
      albumModalBackdrop.classList.remove("visible");
    }

    async function openAlbumModal() {
      if (selectedIds.size === 0) return;
      albumModalBackdrop.classList.add("visible");
      albumModalLoading.hidden = false;
      albumModalEmpty.hidden = true;
      albumModalList.hidden = true;
      albumModalList.innerHTML = "";
      albumModalError.textContent = "";

      try {
        const resp = await fetch("/api/albums");
        if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
        const data = await resp.json();
        const albums = (data.albums || []).slice(0, 10);
        albumModalLoading.hidden = true;
        if (!albums.length) {
          albumModalEmpty.hidden = false;
          return;
        }
        albumModalList.hidden = false;
        for (const a of albums) {
          const li = document.createElement("li");
          li.className = "album-row";
          const cover = document.createElement("div");
          cover.className = "album-row-cover";
          if (a.cover_thumb_url) {
            const coverImg = document.createElement("img");
            coverImg.src = a.cover_thumb_url;
            coverImg.alt = "";
            coverImg.loading = "lazy";
            cover.appendChild(coverImg);
          }
          const meta = document.createElement("div");
          meta.className = "album-row-meta";
          const title = document.createElement("div");
          title.className = "album-row-title";
          title.textContent = a.title;
          title.title = a.title;
          const views = document.createElement("div");
          views.className = "album-row-views";
          views.textContent = pluralize(a.view_count ?? 0, "view");
          meta.appendChild(title);
          meta.appendChild(views);
          li.appendChild(cover);
          li.appendChild(meta);
          li.addEventListener("click", () => addToAlbum(a));
          albumModalList.appendChild(li);
        }
      } catch (err) {
        albumModalLoading.hidden = true;
        albumModalError.textContent = `Failed to load albums: ${err.message}`;
      }
    }

    async function addToAlbum(album) {
      const ids = Array.from(selectedIds);
      if (!ids.length) return;
      albumModalList.style.pointerEvents = "none";
      albumModalError.textContent = "";
      try {
        const resp = await fetch(`/api/albums/${encodeURIComponent(album.album_id)}/photos`, {
          method: "POST",
          headers: {"Content-Type": "application/json"},
          body: JSON.stringify({photo_ids: ids}),
        });
        if (!resp.ok) {
          let detail = `HTTP ${resp.status}`;
          try {
            const data = await resp.json();
            if (data.detail) detail = data.detail;
          } catch (_e) {}
          throw new Error(detail);
        }
        const data = await resp.json();
        closeAlbumModal();
        exitSelectionMode();
        const link = document.createElement("a");
        link.href = `/album/${encodeURIComponent(data.album_id)}`;
        link.textContent = data.title;
        statusEl.replaceChildren(
          document.createTextNode(`Added ${pluralize(data.added, "photo")} to “`),
          link,
          document.createTextNode("”."),
        );
        setTimeout(() => setStatus(""), 4000);
      } catch (err) {
        albumModalError.textContent = err.message;
      } finally {
        albumModalList.style.pointerEvents = "";
      }
    }

    addToAlbumBtn.addEventListener("click", openAlbumModal);
    albumModalCancel.addEventListener("click", closeAlbumModal);
    albumModalBackdrop.addEventListener("click", (e) => {
      if (e.target === albumModalBackdrop) closeAlbumModal();
    });
    document.addEventListener("keydown", (e) => {
      if (e.key !== "Escape") return;
      if (isAlbumModalOpen()) closeAlbumModal();
      else if (selectionMode) exitSelectionMode();
    });
  </script>
</body>
</html>
