<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Your Photographs</title>
  <style>
    :root {
      --bg: #fafafa;
      --fg: #222;
      --muted: #888;
      --border: #e5e5e5;
      --card: #ffffff;
    }
    * { box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      margin: 0;
      background: var(--bg);
      color: var(--fg);
    }
    header {
      padding: 2rem 2rem 1.25rem;
      border-bottom: 1px solid var(--border);
      background: var(--card);
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 1rem;
    }
    header h1 {
      margin: 0;
      font-size: 1.5rem;
      font-weight: 600;
      letter-spacing: -0.01em;
    }
    header a.signout {
      color: var(--muted);
      font-size: 0.9rem;
      text-decoration: none;
    }
    header a.signout:hover { color: var(--fg); text-decoration: underline; }
    main { padding: 2rem; }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 1rem;
    }
    .photo-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 6px;
      aspect-ratio: 1;
    }
    .empty {
      color: var(--muted);
      font-style: italic;
      padding: 4rem 1rem;
      text-align: center;
    }
  </style>
</head>
<body>
  <header>
    <h1>Your Photographs</h1>
    <a class="signout" href="/logout">Sign out</a>
  </header>
  <main>
    <div id="grid" class="grid" hidden></div>
    <div id="empty" class="empty" hidden>No photos yet.</div>
    <div id="loading" class="empty">Loading…</div>
  </main>
  <script>
    async function loadPhotos() {
      const grid = document.getElementById("grid");
      const empty = document.getElementById("empty");
      const loading = document.getElementById("loading");

      try {
        const resp = await fetch("/api/photos");
        if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
        const data = await resp.json();

        loading.hidden = true;

        if (!data.photos || data.photos.length === 0) {
          empty.hidden = false;
          return;
        }

        grid.hidden = false;
        for (const _ of data.photos) {
          const card = document.createElement("div");
          card.className = "photo-card";
          grid.appendChild(card);
        }
      } catch (err) {
        loading.textContent = `Failed to load photos: ${err.message}`;
      }
    }
    loadPhotos();
  </script>
</body>
</html>
