<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Album</title>
  <style>
    :root {
      --bg: #fafafa;
      --fg: #222;
      --muted: #888;
      --border: #e5e5e5;
      --card: #ffffff;
      --accent: #2266dd;
    }
    * { box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      margin: 0;
      background: var(--bg);
      color: var(--fg);
    }
    header {
      padding: 1.5rem 2rem 1.25rem;
      border-bottom: 1px solid var(--border);
      background: var(--card);
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 1rem;
    }
    header h1 {
      margin: 0;
      font-size: 1.5rem;
      font-weight: 600;
      letter-spacing: -0.01em;
    }
    header a.signout {
      color: var(--muted);
      font-size: 0.9rem;
      text-decoration: none;
    }
    header a.signout:hover { color: var(--fg); text-decoration: underline; }

    .nav {
      padding: 0 2rem;
      display: flex;
      gap: 0.25rem;
      border-bottom: 1px solid var(--border);
      background: var(--card);
    }
    .nav-link {
      padding: 0.7rem 1rem;
      color: var(--muted);
      text-decoration: none;
      font-size: 0.9rem;
      border-bottom: 2px solid transparent;
      margin-bottom: -1px;
    }
    .nav-link:hover { color: var(--fg); }
    .nav-link.active {
      color: var(--accent);
      border-bottom-color: var(--accent);
    }

    .album-header {
      padding: 1.25rem 2rem;
      border-bottom: 1px solid var(--border);
      background: var(--card);
    }
    .album-header h2 {
      margin: 0;
      font-size: 1.2rem;
      font-weight: 600;
    }
    .album-header .meta {
      margin-top: 0.4rem;
      font-size: 0.85rem;
      color: var(--muted);
      font-variant-numeric: tabular-nums;
      line-height: 1.5;
    }
    .album-header .meta-line { display: block; }
    .reset-link {
      display: inline-block;
      margin-top: 0.25rem;
      color: #b03030;
      font-size: 0.8rem;
      text-decoration: none;
      cursor: pointer;
      background: none;
      border: none;
      padding: 0;
      font-family: inherit;
    }
    .reset-link:hover { text-decoration: underline; }

    .modal-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.35);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 200;
      visibility: hidden;
    }
    .modal-backdrop.visible { visibility: visible; }
    .modal {
      background: var(--card);
      border-radius: 8px;
      padding: 1.5rem;
      width: min(420px, 90vw);
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.15);
    }
    .modal h2 {
      margin: 0 0 0.75rem;
      font-size: 1.1rem;
      font-weight: 600;
    }
    .modal .modal-body {
      margin: 0;
      color: var(--fg);
      font-size: 0.95rem;
    }
    .modal-error {
      margin-top: 0.5rem;
      color: #b03030;
      font-size: 0.85rem;
      min-height: 1em;
    }
    .modal-actions {
      margin-top: 1.25rem;
      display: flex;
      justify-content: flex-end;
      gap: 0.5rem;
    }
    .modal-actions button {
      padding: 0.45rem 1rem;
      font-size: 0.9rem;
      border-radius: 6px;
      cursor: pointer;
      font-family: inherit;
    }
    .modal-actions .cancel {
      background: var(--card);
      border: 1px solid var(--border);
      color: var(--fg);
    }
    .modal-actions .cancel:hover { background: var(--bg); }
    .modal-actions .submit {
      background: var(--accent);
      color: white;
      border: none;
    }
    .modal-actions .submit:hover { filter: brightness(1.1); }
    .modal-actions .submit:disabled {
      filter: grayscale(0.5);
      cursor: not-allowed;
    }
    .modal-actions .submit.danger { background: #b03030; }

    .toolbar {
      padding: 0.75rem 2rem;
      display: flex;
      align-items: center;
      gap: 1rem;
      border-bottom: 1px solid var(--border);
      background: var(--card);
    }
    .upload-btn {
      display: inline-flex;
      align-items: center;
      padding: 0.45rem 1rem;
      background: var(--accent);
      color: white;
      border: none;
      border-radius: 6px;
      font-size: 0.9rem;
      font-weight: 500;
      cursor: pointer;
    }
    .upload-btn:hover { filter: brightness(1.1); }
    .upload-btn:disabled {
      filter: grayscale(0.6);
      cursor: not-allowed;
    }
    .upload-hint {
      color: var(--muted);
      font-size: 0.9rem;
    }
    .share-btn {
      display: inline-flex;
      align-items: center;
      gap: 0.35rem;
      padding: 0.45rem 0.85rem;
      background: var(--card);
      color: var(--fg);
      border: 1px solid var(--border);
      border-radius: 6px;
      font-size: 0.9rem;
      font-weight: 500;
      cursor: pointer;
      font-family: inherit;
    }
    .share-btn:hover { border-color: var(--accent); color: var(--accent); }
    .share-btn:disabled {
      filter: grayscale(0.6);
      cursor: not-allowed;
    }
    .status {
      margin-left: auto;
      color: var(--muted);
      font-size: 0.9rem;
    }

    .shares {
      padding: 0.75rem 2rem 1rem;
      border-bottom: 1px solid var(--border);
      background: var(--card);
    }
    .shares-title {
      font-size: 0.8rem;
      color: var(--muted);
      margin-bottom: 0.4rem;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }
    .shares-list {
      display: flex;
      flex-direction: column;
      gap: 0.25rem;
    }
    .share-row {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      font-size: 0.85rem;
      font-variant-numeric: tabular-nums;
    }
    .share-link {
      color: var(--accent);
      text-decoration: none;
      word-break: break-all;
    }
    .share-link:hover { text-decoration: underline; }
    .share-copy {
      background: none;
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 0.15rem 0.5rem;
      font-size: 0.75rem;
      color: var(--muted);
      cursor: pointer;
      font-family: inherit;
    }
    .share-copy:hover { border-color: var(--accent); color: var(--accent); }
    .share-empty {
      font-size: 0.85rem;
      color: var(--muted);
      font-style: italic;
    }

    main { padding: 2rem; min-height: 50vh; }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(330px, 1fr));
      gap: 1rem;
    }
    .photo-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 6px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      color: inherit;
      text-decoration: none;
    }
    .photo-card:hover { border-color: var(--accent); }
    .photo-card .thumb {
      aspect-ratio: 1;
      width: 100%;
      overflow: hidden;
    }
    .photo-card img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }
    .photo-meta {
      padding: 0.4rem 0.55rem;
      font-size: 0.72rem;
      color: var(--muted);
      display: flex;
      justify-content: space-between;
      gap: 0.5rem;
      font-variant-numeric: tabular-nums;
    }
    .photo-meta .counts { white-space: nowrap; }

    .empty, .loading, .error {
      color: var(--muted);
      font-style: italic;
      padding: 4rem 1rem;
      text-align: center;
    }
    .error { color: #b03030; font-style: normal; }

    .drop-overlay {
      position: fixed;
      inset: 0;
      background: rgba(34, 102, 221, 0.08);
      border: 4px dashed var(--accent);
      display: flex;
      align-items: center;
      justify-content: center;
      pointer-events: none;
      z-index: 100;
      visibility: hidden;
    }
    .drop-overlay.visible { visibility: visible; }
    .drop-overlay span {
      background: var(--card);
      padding: 1rem 2rem;
      border-radius: 8px;
      font-size: 1.2rem;
      color: var(--accent);
    }

    .progress {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      height: 3px;
      background: rgba(34, 102, 221, 0.15);
      z-index: 150;
      visibility: hidden;
    }
    .progress.active { visibility: visible; }
    .progress-fill {
      height: 100%;
      width: 0%;
      background: var(--accent);
      transition: width 0.2s ease;
    }
  </style>
</head>
<body>
  <header>
    <h1>Your Photographs</h1>
    <a class="signout" href="/logout">Sign out</a>
  </header>
  <nav class="nav">
    <a class="nav-link" href="/">All Photos</a>
    <a class="nav-link active" href="/albums">Albums</a>
  </nav>
  <div class="album-header">
    <h2 id="album-title">…</h2>
    <div id="album-meta" class="meta"></div>
  </div>

  <div id="reset-modal-backdrop" class="modal-backdrop" role="dialog" aria-modal="true" aria-labelledby="reset-modal-title">
    <div class="modal">
      <h2 id="reset-modal-title">Danger — there be dragons</h2>
      <p class="modal-body">Are you sure you want to reset all counters for this album?</p>
      <div id="reset-modal-error" class="modal-error"></div>
      <div class="modal-actions">
        <button type="button" class="cancel" id="reset-no-btn">No</button>
        <button type="button" class="submit danger" id="reset-yes-btn">Yes</button>
      </div>
    </div>
  </div>
  <div class="toolbar">
    <button id="upload-btn" class="upload-btn" type="button">Upload photos</button>
    <span class="upload-hint">or drag photos anywhere on this page</span>
    <button id="share-btn" class="share-btn" type="button" title="Create a shareable link">
      <span aria-hidden="true">🔗</span> Share
    </button>
    <span id="status" class="status"></span>
    <input id="file-input" type="file" accept="image/jpeg,image/png,image/webp" multiple hidden>
  </div>
  <div class="shares" id="shares" hidden>
    <div class="shares-title">Share links</div>
    <div id="shares-list" class="shares-list"></div>
  </div>
  <main>
    <div id="loading" class="loading">Loading…</div>
    <div id="empty" class="empty" hidden>No photos in this album yet.</div>
    <div id="grid" class="grid" hidden></div>
  </main>
  <div id="drop-overlay" class="drop-overlay">
    <span>Drop to upload</span>
  </div>
  <div id="progress" class="progress"><div id="progress-fill" class="progress-fill"></div></div>
  <script src="/static/uploads.js"></script>
  <script>
    const albumId = decodeURIComponent(location.pathname.split("/").filter(Boolean).pop());
    const titleEl = document.getElementById("album-title");
    const metaEl = document.getElementById("album-meta");
    const grid = document.getElementById("grid");
    const empty = document.getElementById("empty");
    const loading = document.getElementById("loading");
    const statusEl = document.getElementById("status");
    const uploadBtn = document.getElementById("upload-btn");
    const fileInput = document.getElementById("file-input");
    const dropOverlay = document.getElementById("drop-overlay");
    const progressEl = document.getElementById("progress");
    const progressFillEl = document.getElementById("progress-fill");
    const shareBtn = document.getElementById("share-btn");
    const sharesContainer = document.getElementById("shares");
    const sharesList = document.getElementById("shares-list");
    const resetBackdrop = document.getElementById("reset-modal-backdrop");
    const resetYesBtn = document.getElementById("reset-yes-btn");
    const resetNoBtn = document.getElementById("reset-no-btn");
    const resetErrorEl = document.getElementById("reset-modal-error");

    function renderMeta(data) {
      metaEl.innerHTML = "";
      const lines = [
        pluralize(data.photos.length, "photo"),
        pluralize(data.view_count ?? 0, "view"),
        pluralize(data.download_count ?? 0, "download"),
      ];
      for (const line of lines) {
        const span = document.createElement("span");
        span.className = "meta-line";
        span.textContent = line;
        metaEl.appendChild(span);
      }
      const reset = document.createElement("button");
      reset.type = "button";
      reset.className = "reset-link";
      reset.textContent = "Reset counts";
      reset.addEventListener("click", openResetModal);
      metaEl.appendChild(reset);
    }

    function openResetModal() {
      resetErrorEl.textContent = "";
      resetYesBtn.disabled = false;
      resetNoBtn.disabled = false;
      resetBackdrop.classList.add("visible");
      resetNoBtn.focus();
    }
    function closeResetModal() {
      resetBackdrop.classList.remove("visible");
    }
    resetNoBtn.addEventListener("click", closeResetModal);
    resetBackdrop.addEventListener("click", (e) => {
      if (e.target === resetBackdrop) closeResetModal();
    });
    document.addEventListener("keydown", (e) => {
      if (e.key === "Escape" && resetBackdrop.classList.contains("visible")) closeResetModal();
    });
    resetYesBtn.addEventListener("click", async () => {
      resetYesBtn.disabled = true;
      resetNoBtn.disabled = true;
      resetErrorEl.textContent = "";
      try {
        const resp = await fetch(`/api/albums/${encodeURIComponent(albumId)}/reset-counts`, {
          method: "POST",
        });
        if (!resp.ok) {
          let detail = `HTTP ${resp.status}`;
          try {
            const data = await resp.json();
            if (data.detail) detail = data.detail;
          } catch (_e) {}
          throw new Error(detail);
        }
        closeResetModal();
        await load();
      } catch (err) {
        resetErrorEl.textContent = err.message;
        resetYesBtn.disabled = false;
        resetNoBtn.disabled = false;
      }
    });

    function updateProgress({ done, total }) {
      progressEl.classList.add("active");
      const pct = total > 0 ? Math.round((done / total) * 100) : 0;
      progressFillEl.style.width = `${pct}%`;
    }
    function hideProgress() {
      progressEl.classList.remove("active");
      progressFillEl.style.width = "0%";
    }

    function pluralize(n, word) { return `${n} ${word}${n === 1 ? "" : "s"}`; }
    function setStatus(text) { statusEl.textContent = text || ""; }

    function takenDateParts(photo) {
      const d = new Date((photo.taken_at || photo.uploaded_at) * 1000);
      const y = d.getFullYear();
      const m = String(d.getMonth() + 1).padStart(2, "0");
      const day = String(d.getDate()).padStart(2, "0");
      const hh = String(d.getHours()).padStart(2, "0");
      const mm = String(d.getMinutes()).padStart(2, "0");
      return { date: `${y}-${m}-${day}`, time: `${hh}:${mm}` };
    }

    function buildPhotoCard(photo) {
      const card = document.createElement("a");
      card.className = "photo-card";
      card.href = `/photo/${photo.photo_id}?from=${encodeURIComponent("/album/" + albumId)}`;

      const thumb = document.createElement("div");
      thumb.className = "thumb";
      const img = document.createElement("img");
      img.src = photo.medium_url;
      img.alt = "";
      img.loading = "lazy";
      thumb.appendChild(img);
      card.appendChild(thumb);

      const meta = document.createElement("div");
      meta.className = "photo-meta";
      const { date, time } = takenDateParts(photo);
      const taken = document.createElement("span");
      taken.textContent = `${date} ${time}`;
      const counts = document.createElement("span");
      counts.className = "counts";
      counts.textContent = `${photo.view_count ?? 0} views · ${photo.download_count ?? 0} dl`;
      meta.appendChild(taken);
      meta.appendChild(counts);
      card.appendChild(meta);

      return card;
    }

    async function load() {
      try {
        const resp = await fetch(`/api/albums/${encodeURIComponent(albumId)}`);
        if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
        const data = await resp.json();

        titleEl.textContent = data.title || "Untitled album";
        document.title = data.title ? `${data.title} — Album` : "Album";
        renderMeta(data);

        loading.hidden = true;
        grid.innerHTML = "";
        if (!data.photos.length) {
          empty.hidden = false;
          grid.hidden = true;
          return;
        }
        empty.hidden = true;
        grid.hidden = false;
        for (const p of data.photos) grid.appendChild(buildPhotoCard(p));
      } catch (err) {
        loading.className = "error";
        loading.textContent = `Failed to load album: ${err.message}`;
      }
    }

    load();

    uploadBtn.addEventListener("click", () => fileInput.click());
    fileInput.addEventListener("change", () => {
      if (fileInput.files.length) handleFiles(Array.from(fileInput.files));
      fileInput.value = "";
    });

    let dragDepth = 0;
    function isFileDrag(e) {
      return e.dataTransfer && Array.from(e.dataTransfer.types || []).includes("Files");
    }

    window.addEventListener("dragenter", (e) => {
      if (!isFileDrag(e)) return;
      dragDepth++;
      dropOverlay.classList.add("visible");
      e.preventDefault();
    });
    window.addEventListener("dragleave", () => {
      dragDepth = Math.max(0, dragDepth - 1);
      if (dragDepth === 0) dropOverlay.classList.remove("visible");
    });
    window.addEventListener("dragover", (e) => {
      if (isFileDrag(e)) e.preventDefault();
    });
    window.addEventListener("drop", (e) => {
      dragDepth = 0;
      dropOverlay.classList.remove("visible");
      if (!isFileDrag(e)) return;
      e.preventDefault();
      const files = Array.from(e.dataTransfer?.files || []);
      if (files.length) handleFiles(files);
    });

    async function handleFiles(files) {
      try {
        const result = await PhotoUploads.uploadFiles(files, {
          albumId,
          onStatus: setStatus,
          onProgress: updateProgress,
        });
        if (result.added > 0) await load();
      } finally {
        hideProgress();
      }
    }

    function renderShares(shares) {
      sharesList.innerHTML = "";
      if (!shares.length) {
        sharesContainer.hidden = true;
        return;
      }
      sharesContainer.hidden = false;
      for (const s of shares) {
        const row = document.createElement("div");
        row.className = "share-row";

        const a = document.createElement("a");
        a.className = "share-link";
        a.href = s.public_url;
        a.target = "_blank";
        a.rel = "noopener";
        a.textContent = s.public_url;

        const copy = document.createElement("button");
        copy.className = "share-copy";
        copy.type = "button";
        copy.textContent = "Copy";
        copy.addEventListener("click", () => copyToClipboard(s.public_url, copy));

        row.appendChild(a);
        row.appendChild(copy);
        sharesList.appendChild(row);
      }
    }

    async function copyToClipboard(text, btn) {
      try {
        await navigator.clipboard.writeText(text);
        if (btn) {
          const original = btn.textContent;
          btn.textContent = "Copied";
          setTimeout(() => { btn.textContent = original; }, 1500);
        }
      } catch (_e) {
        setStatus("Copy failed — link selected, press ⌘C");
      }
    }

    async function loadShares() {
      try {
        const resp = await fetch(`/api/albums/${encodeURIComponent(albumId)}/shares`);
        if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
        const data = await resp.json();
        renderShares(data.shares || []);
      } catch (_e) {
        sharesContainer.hidden = true;
      }
    }

    loadShares();

    shareBtn.addEventListener("click", async () => {
      shareBtn.disabled = true;
      setStatus("Building zip…");
      try {
        const resp = await fetch(`/api/albums/${encodeURIComponent(albumId)}/shares`, {
          method: "POST",
        });
        if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
        const data = await resp.json();
        await copyToClipboard(data.public_url);
        setStatus(`Link copied: ${data.public_url}`);
        setTimeout(() => setStatus(""), 4000);
        await loadShares();
      } catch (err) {
        setStatus(`Share failed: ${err.message}`);
      } finally {
        shareBtn.disabled = false;
      }
    });
  </script>
</body>
</html>
