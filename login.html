<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Sign in — Your Photographs</title>
  <style>
    * { box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #fafafa;
      color: #222;
    }
    .card {
      background: #ffffff;
      padding: 2rem;
      border: 1px solid #e5e5e5;
      border-radius: 8px;
      width: min(420px, 90vw);
    }
    h1 {
      margin: 0 0 0.5rem;
      font-size: 1.25rem;
      font-weight: 600;
      letter-spacing: -0.01em;
    }
    p {
      margin: 0 0 1.25rem;
      color: #666;
      font-size: 0.95rem;
    }
    label {
      display: block;
      margin: 0 0 0.4rem;
      font-size: 0.85rem;
      font-weight: 500;
    }
    input[type=email] {
      width: 100%;
      padding: 0.65rem 0.75rem;
      border: 1px solid #ccc;
      border-radius: 4px;
      font-size: 1rem;
      margin-bottom: 1rem;
    }
    button {
      width: 100%;
      padding: 0.7rem;
      background: #222;
      color: #ffffff;
      border: 0;
      border-radius: 4px;
      font-size: 1rem;
      font-weight: 500;
      cursor: pointer;
    }
    button:hover { background: #000; }
    .error {
      color: #c00;
      margin-bottom: 1rem;
      font-size: 0.9rem;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Sign in</h1>
    <p>Enter your email and we'll send you a sign-in link.</p>
    <div id="error" class="error" hidden>That sign-in link wasn't valid or has expired. Please request a new one.</div>
    <form method="post" action="/login">
      <label for="email">Email</label>
      <input id="email" type="email" name="email" required autofocus>
      <button type="submit">Send link</button>
    </form>
  </div>
  <script>
    if (new URLSearchParams(location.search).get("error") === "invalid") {
      document.getElementById("error").hidden = false;
    }
  </script>
</body>
</html>
