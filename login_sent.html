<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Check your email — Your Photographs</title>
  <style>
    * { box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #fafafa;
      color: #222;
    }
    .card {
      background: #ffffff;
      padding: 2rem;
      border: 1px solid #e5e5e5;
      border-radius: 8px;
      width: min(420px, 90vw);
      text-align: center;
    }
    h1 {
      margin: 0 0 0.5rem;
      font-size: 1.25rem;
      font-weight: 600;
      letter-spacing: -0.01em;
    }
    p {
      margin: 0 0 0.5rem;
      color: #666;
      font-size: 0.95rem;
    }
    p:last-child { margin-bottom: 0; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Check your email</h1>
    <p>If your address is on the allowlist, a sign-in link is on its way.</p>
    <p>The link expires in 15 minutes.</p>
  </div>
</body>
</html>
