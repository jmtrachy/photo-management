<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Photo</title>
  <style>
    :root {
      --bg: #fafafa;
      --fg: #222;
      --muted: #888;
      --border: #e5e5e5;
      --card: #ffffff;
      --accent: #2266dd;
    }
    * { box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      margin: 0;
      background: var(--bg);
      color: var(--fg);
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }
    .top-header {
      flex: 0 0 auto;
      padding: 0.55rem 1.25rem;
      border-bottom: 1px solid var(--border);
      background: var(--card);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
    }
    .top-header h1 {
      margin: 0;
      font-size: 1.1rem;
      font-weight: 600;
      letter-spacing: -0.01em;
    }
    .top-header h1 a { color: var(--fg); text-decoration: none; }
    .top-header h1 a:hover { text-decoration: underline; }
    .top-header a.signout {
      color: var(--muted);
      font-size: 0.85rem;
      text-decoration: none;
    }
    .top-header a.signout:hover { color: var(--fg); text-decoration: underline; }

    .layout {
      flex: 1 1 auto;
      display: flex;
      min-height: 0;
    }
    .sidebar {
      flex: 0 0 220px;
      background: var(--card);
      border-right: 1px solid var(--border);
      padding: 1rem 0.75rem;
      display: flex;
      flex-direction: column;
      gap: 1.25rem;
      overflow-y: auto;
    }
    .sidebar-section { display: flex; flex-direction: column; gap: 0.2rem; }
    .nav-link {
      display: block;
      padding: 0.5rem 0.85rem;
      color: var(--muted);
      text-decoration: none;
      font-size: 0.9rem;
      border-radius: 6px;
    }
    .nav-link:hover { color: var(--fg); background: var(--bg); }
    .nav-link.active {
      color: var(--accent);
      background: rgba(34, 102, 221, 0.08);
    }
    .back-link {
      display: block;
      width: 100%;
      padding: 0.45rem 0.85rem;
      color: var(--muted);
      font-size: 0.85rem;
      text-decoration: none;
      background: none;
      border: 1px solid var(--border);
      border-radius: 6px;
      cursor: pointer;
      font-family: inherit;
      text-align: left;
    }
    .back-link:hover { color: var(--fg); border-color: var(--accent); }

    main {
      flex: 1 1 auto;
      padding: 1.5rem 2rem;
      overflow-y: auto;
      min-height: 0;
      position: relative;
    }
    .stage {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1rem;
    }
    #photo {
      max-width: 100%;
      max-height: 80vh;
      display: block;
      border-radius: 6px;
      box-shadow: 0 1px 4px rgba(0, 0, 0, 0.06);
    }
    .actions {
      font-size: 0.85rem;
      color: var(--muted);
    }
    .actions a {
      color: var(--accent);
      text-decoration: none;
      margin: 0 0.4rem;
    }
    .actions a:hover { text-decoration: underline; }

    .nav-btn {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      width: 2.75rem;
      height: 2.75rem;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 50%;
      color: var(--fg);
      text-decoration: none;
      font-size: 1.5rem;
      line-height: 1;
      cursor: pointer;
      box-shadow: 0 1px 4px rgba(0, 0, 0, 0.08);
      user-select: none;
      z-index: 5;
    }
    .nav-btn:hover { background: var(--bg); }
    .nav-btn.prev { left: 1rem; }
    .nav-btn.next { right: 1rem; }
    .nav-btn[hidden] { display: none; }

    .loading, .error {
      color: var(--muted);
      font-style: italic;
      padding: 4rem 1rem;
      text-align: center;
    }
    .error { color: #b03030; font-style: normal; }

    @media (max-width: 720px) {
      .layout { flex-direction: column; }
      .sidebar {
        flex: 0 0 auto;
        border-right: none;
        border-bottom: 1px solid var(--border);
      }
      main { padding: 1.25rem; }
    }
  </style>
</head>
<body>
  <header class="top-header">
    <h1><a href="/">Your Photographs</a></h1>
    <a class="signout" href="/logout">Sign out</a>
  </header>
  <div class="layout">
    <aside class="sidebar">
      <nav class="sidebar-section">
        <a class="nav-link" href="/">All Photos</a>
        <a class="nav-link" href="/albums">Albums</a>
      </nav>
      <div class="sidebar-section">
        <button id="back-btn" class="back-link" type="button">← Back</button>
      </div>
    </aside>
    <main>
      <a id="prev-link" class="nav-btn prev" href="#" hidden aria-label="Previous photo">‹</a>
      <a id="next-link" class="nav-btn next" href="#" hidden aria-label="Next photo">›</a>
      <div id="loading" class="loading">Loading…</div>
      <div id="stage" class="stage" hidden>
        <img id="photo" alt="">
        <div class="actions">
          <a id="view-original" target="_blank" rel="noopener">View original</a>
          ·
          <a id="download-original">Download original</a>
        </div>
      </div>
    </main>
  </div>
  <script>
    const photoId = decodeURIComponent(location.pathname.split("/").filter(Boolean).pop());
    const fromRaw = new URLSearchParams(location.search).get("from") || "/";
    const fromPath = (fromRaw.startsWith("/") && !fromRaw.startsWith("//")) ? fromRaw : "/";
    const fromQuery = `?from=${encodeURIComponent(fromPath)}`;

    const stage = document.getElementById("stage");
    const photoEl = document.getElementById("photo");
    const loading = document.getElementById("loading");
    const viewOriginal = document.getElementById("view-original");
    const downloadOriginal = document.getElementById("download-original");
    const prevLink = document.getElementById("prev-link");
    const nextLink = document.getElementById("next-link");
    const backBtn = document.getElementById("back-btn");

    backBtn.addEventListener("click", () => {
      location.href = fromPath;
    });

    function prefetchAdjacent(...urls) {
      for (const url of urls) {
        if (!url) continue;
        const link = document.createElement("link");
        link.rel = "prefetch";
        link.as = "image";
        link.href = url;
        document.head.appendChild(link);
      }
    }

    async function load() {
      try {
        const resp = await fetch(`/api/photos/${encodeURIComponent(photoId)}`);
        if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
        const data = await resp.json();

        photoEl.src = data.medium_url || data.original_url;
        viewOriginal.href = data.original_url;
        downloadOriginal.href = data.download_url;

        if (data.prev_photo_id) {
          prevLink.href = `/photo/${data.prev_photo_id}${fromQuery}`;
          prevLink.hidden = false;
        }
        if (data.next_photo_id) {
          nextLink.href = `/photo/${data.next_photo_id}${fromQuery}`;
          nextLink.hidden = false;
        }

        prefetchAdjacent(data.prev_medium_url, data.next_medium_url);

        loading.hidden = true;
        stage.hidden = false;
      } catch (err) {
        loading.className = "error";
        loading.textContent = `Failed to load photo: ${err.message}`;
      }
    }

    load();
  </script>
</body>
</html>
