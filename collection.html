<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Collection</title>
  <style>
    :root {
      --bg: #fafafa;
      --fg: #222;
      --muted: #888;
      --border: #e5e5e5;
      --card: #ffffff;
      --accent: #2266dd;
      --danger: #b03030;
    }
    * { box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      margin: 0;
      background: var(--bg);
      color: var(--fg);
      display: flex;
      flex-direction: column;
      height: 100vh;
    }
    .top-header {
      flex: 0 0 auto;
      padding: 0.55rem 1.25rem;
      border-bottom: 1px solid var(--border);
      background: var(--card);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
    }
    .top-header h1 {
      margin: 0;
      font-size: 1.1rem;
      font-weight: 600;
      letter-spacing: -0.01em;
    }
    .top-header a.signout {
      color: var(--muted);
      font-size: 0.85rem;
      text-decoration: none;
    }
    .top-header a.signout:hover { color: var(--fg); text-decoration: underline; }

    .layout {
      flex: 1 1 auto;
      display: flex;
      min-height: 0;
    }
    .sidebar {
      flex: 0 0 230px;
      background: var(--card);
      border-right: 1px solid var(--border);
      padding: 1rem 0.75rem;
      display: flex;
      flex-direction: column;
      gap: 1.25rem;
      overflow-y: auto;
    }
    .sidebar-section { display: flex; flex-direction: column; gap: 0.2rem; }
    .nav-link {
      display: block;
      padding: 0.5rem 0.85rem;
      color: var(--muted);
      text-decoration: none;
      font-size: 0.9rem;
      border-radius: 6px;
    }
    .nav-link:hover { color: var(--fg); background: var(--bg); }
    .nav-link.active {
      color: var(--accent);
      background: rgba(34, 102, 221, 0.08);
    }

    .new-btn {
      display: block;
      width: 100%;
      padding: 0.5rem 0.85rem;
      background: var(--accent);
      color: white;
      border: none;
      border-radius: 6px;
      font-size: 0.9rem;
      font-weight: 500;
      cursor: pointer;
      font-family: inherit;
    }
    .new-btn:hover { filter: brightness(1.1); }
    .new-btn.secondary {
      background: var(--card);
      border: 1px solid var(--border);
      color: var(--fg);
    }
    .new-btn.secondary:hover { background: var(--bg); filter: none; }
    .new-btn.danger {
      background: var(--card);
      border: 1px solid var(--border);
      color: var(--danger);
    }
    .new-btn.danger:hover { background: var(--bg); filter: none; }
    .new-btn:disabled {
      filter: grayscale(0.5);
      cursor: not-allowed;
    }

    .select-count {
      font-size: 0.9rem;
      color: var(--fg);
      padding: 0 0.1rem;
    }
    .select-count strong { font-variant-numeric: tabular-nums; }
    .select-section-label {
      font-size: 0.72rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--muted);
      padding: 0 0.1rem;
    }
    .link-btn {
      background: none;
      border: none;
      color: var(--muted);
      cursor: pointer;
      font-size: 0.85rem;
      padding: 0.3rem 0.1rem;
      font-family: inherit;
      text-align: left;
    }
    .link-btn:hover { color: var(--fg); }
    .add-mode, .select-mode {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }
    .select-mode { display: none; }
    body.selecting .add-mode { display: none; }
    body.selecting .select-mode { display: flex; }
    .status {
      color: var(--muted);
      font-size: 0.85rem;
      padding: 0 0.1rem;
      word-break: break-word;
    }
    .status:empty { display: none; }

    main {
      flex: 1 1 auto;
      padding: 1.5rem 2rem;
      overflow-y: auto;
      min-height: 0;
    }

    .drawer-toggle {
      display: none;
      background: none;
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--fg);
      font-size: 0.9rem;
      padding: 0.3rem 0.6rem;
      cursor: pointer;
      font-family: inherit;
    }
    .drawer-toggle:hover { background: var(--bg); }

    @media (max-width: 720px) {
      .layout { flex-direction: column; }
      .sidebar {
        flex: 0 0 auto;
        border-right: none;
        border-bottom: 1px solid var(--border);
        display: none;
      }
      body.drawer-open .sidebar { display: flex; }
      .drawer-toggle { display: inline-block; }
      main { padding: 1.25rem; }
    }

    .page-header {
      margin: 0 0 0.75rem;
      display: flex;
      align-items: baseline;
      gap: 0.6rem;
      flex-wrap: wrap;
    }
    .page-header h2 {
      margin: 0;
      font-size: 1.25rem;
      font-weight: 600;
      cursor: pointer;
    }
    .page-header h2:hover {
      text-decoration: underline;
      text-decoration-style: dashed;
      text-underline-offset: 4px;
      text-decoration-color: var(--muted);
    }
    .title-edit-input {
      font-size: 1.25rem;
      font-weight: 600;
      border: 1px solid var(--accent);
      border-radius: 4px;
      padding: 0.1rem 0.3rem;
      font-family: inherit;
      width: auto;
      min-width: 200px;
      display: none;
    }
    .title-edit-input:focus { outline: none; }
    .breadcrumb {
      color: var(--muted);
      font-size: 0.9rem;
      text-decoration: none;
    }
    .breadcrumb:hover { color: var(--fg); text-decoration: underline; }

    .public-url {
      font-size: 0.82rem;
      color: var(--muted);
      margin-bottom: 1.25rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      flex-wrap: wrap;
    }
    .public-url a {
      color: var(--accent);
      text-decoration: none;
      word-break: break-all;
    }
    .public-url a:hover { text-decoration: underline; }
    .public-url button {
      background: none;
      border: 1px solid var(--border);
      color: var(--muted);
      cursor: pointer;
      font-size: 0.78rem;
      padding: 0.15rem 0.5rem;
      border-radius: 4px;
      font-family: inherit;
    }
    .public-url button:hover { color: var(--fg); }

    .section { margin-bottom: 2rem; }
    .section-header {
      display: flex;
      align-items: baseline;
      gap: 0.5rem;
      margin-bottom: 0.6rem;
    }
    .section-title {
      font-size: 1rem;
      font-weight: 500;
      margin: 0;
    }
    .section-count {
      font-size: 0.78rem;
      color: var(--muted);
      font-variant-numeric: tabular-nums;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 1rem;
    }
    .album-card {
      position: relative;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 6px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      color: inherit;
      text-decoration: none;
    }
    .album-card:hover { border-color: var(--accent); }
    .album-card .cover {
      aspect-ratio: 1;
      width: 100%;
      background: #ececec;
      overflow: hidden;
    }
    .album-card .cover img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }
    .album-meta {
      padding: 0.55rem 0.7rem 0.65rem;
    }
    .album-title {
      font-size: 0.95rem;
      font-weight: 500;
      color: var(--fg);
      margin: 0 0 0.2rem;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .album-meta-date {
      font-size: 0.72rem;
      color: var(--muted);
      font-variant-numeric: tabular-nums;
    }
    .radio {
      position: absolute;
      top: 0.5rem;
      right: 0.5rem;
      width: 1.5rem;
      height: 1.5rem;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.92);
      border: 2px solid #bbb;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      opacity: 0;
      transition: opacity 0.1s;
      z-index: 2;
    }
    .radio svg {
      width: 0.9rem;
      height: 0.9rem;
      color: white;
      visibility: hidden;
    }
    .album-card:hover .radio,
    body.selecting .radio { opacity: 1; }
    .album-card.selected .radio {
      background: var(--accent);
      border-color: var(--accent);
    }
    .album-card.selected .radio svg { visibility: visible; }

    .empty, .loading {
      color: var(--muted);
      font-style: italic;
      padding: 2rem 1rem;
      text-align: center;
    }
    .empty.section-empty { padding: 1.5rem 1rem; font-size: 0.9rem; }

    /* Add-albums modal */
    .modal-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.35);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 200;
      visibility: hidden;
    }
    .modal-backdrop.visible { visibility: visible; }
    .modal {
      background: var(--card);
      border-radius: 8px;
      padding: 1.5rem;
      width: min(520px, 90vw);
      max-height: 80vh;
      display: flex;
      flex-direction: column;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.15);
    }
    .modal h2 {
      margin: 0 0 1rem;
      font-size: 1.1rem;
      font-weight: 600;
    }
    .visibility-choice {
      border: none;
      padding: 0;
      margin: 0 0 0.75rem;
      display: flex;
      align-items: center;
      gap: 1rem;
    }
    .visibility-choice legend {
      padding: 0;
      font-size: 0.78rem;
      color: var(--muted);
    }
    .visibility-choice label {
      display: inline-flex;
      align-items: center;
      gap: 0.3rem;
      font-size: 0.9rem;
      cursor: pointer;
    }
    .modal-filter {
      width: 100%;
      padding: 0.5rem 0.65rem;
      font-size: 0.95rem;
      border: 1px solid var(--border);
      border-radius: 6px;
      font-family: inherit;
      margin-bottom: 0.75rem;
    }
    .modal-filter:focus {
      outline: none;
      border-color: var(--accent);
    }
    .album-pick-list {
      list-style: none;
      margin: 0;
      padding: 0;
      overflow-y: auto;
      flex: 1;
      border: 1px solid var(--border);
      border-radius: 6px;
    }
    .album-pick-row {
      display: flex;
      align-items: center;
      gap: 0.7rem;
      padding: 0.55rem 0.7rem;
      border-bottom: 1px solid var(--border);
      cursor: pointer;
    }
    .album-pick-row:last-child { border-bottom: none; }
    .album-pick-row:hover { background: var(--bg); }
    .album-pick-row input[type="checkbox"] { flex-shrink: 0; }
    .album-pick-row .album-row-cover {
      width: 36px;
      height: 36px;
      border-radius: 4px;
      background: #ececec;
      flex-shrink: 0;
      overflow: hidden;
    }
    .album-pick-row .album-row-cover img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }
    .album-pick-row .album-pick-title {
      flex: 1;
      font-size: 0.9rem;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .album-pick-row.in-collection {
      color: var(--muted);
      cursor: default;
    }
    .album-pick-row.in-collection:hover { background: transparent; }
    .album-pick-tag {
      font-size: 0.72rem;
      color: var(--muted);
      font-style: italic;
    }
    .modal-loading, .modal-empty {
      padding: 1.5rem 0.5rem;
      text-align: center;
      color: var(--muted);
      font-size: 0.9rem;
    }
    .modal-empty { font-style: italic; }
    .modal-error {
      margin-top: 0.5rem;
      color: var(--danger);
      font-size: 0.85rem;
      min-height: 1em;
    }
    .modal-actions {
      margin-top: 1rem;
      display: flex;
      justify-content: flex-end;
      align-items: center;
      gap: 0.5rem;
    }
    .modal-actions .count {
      flex: 1;
      color: var(--muted);
      font-size: 0.85rem;
    }
    .modal-actions button {
      padding: 0.45rem 1rem;
      font-size: 0.9rem;
      border-radius: 6px;
      cursor: pointer;
      font-family: inherit;
    }
    .modal-actions .cancel {
      background: var(--card);
      border: 1px solid var(--border);
      color: var(--fg);
    }
    .modal-actions .cancel:hover { background: var(--bg); }
    .modal-actions .submit {
      background: var(--accent);
      color: white;
      border: none;
    }
    .modal-actions .submit:hover { filter: brightness(1.1); }
    .modal-actions .submit:disabled {
      filter: grayscale(0.5);
      cursor: not-allowed;
    }
  </style>
</head>
<body>
  <header class="top-header">
    <button type="button" class="drawer-toggle" id="drawer-toggle" aria-expanded="false" aria-controls="sidebar">☰ Menu</button>
    <h1>Your Photographs</h1>
    <a class="signout" href="/logout">Sign out</a>
  </header>
  <div class="layout">
    <aside class="sidebar" id="sidebar">
      <nav class="sidebar-section">
        <a class="nav-link" href="/">All Photos</a>
        <a class="nav-link" href="/albums">Albums</a>
        <a class="nav-link active" href="/collections">Collections</a>
      </nav>
      <div class="sidebar-section">
        <div class="add-mode">
          <button id="add-albums-btn" class="new-btn" type="button">Add albums</button>
        </div>
        <div class="select-mode" id="select-mode-bar">
          <span class="select-count"><strong id="select-count">0</strong> selected</span>
          <span class="select-section-label" id="select-section-label">in Listed</span>
          <button id="action-primary-btn" class="new-btn" type="button">Unlist</button>
          <button id="action-remove-btn" class="new-btn danger" type="button">Remove</button>
          <button id="cancel-select-btn" class="link-btn" type="button">Cancel</button>
        </div>
      </div>
      <div id="status" class="status sidebar-section"></div>
    </aside>
    <main>
      <div class="page-header">
        <a class="breadcrumb" href="/collections">Collections</a>
        <span class="breadcrumb">›</span>
        <h2 id="collection-title">…</h2>
        <input id="collection-title-input" class="title-edit-input" type="text" maxlength="200">
      </div>
      <div id="public-url" class="public-url" hidden>
        <span>Public link:</span>
        <a id="public-url-link" href="#" target="_blank" rel="noopener"></a>
        <button type="button" id="copy-url-btn">Copy</button>
      </div>
      <div id="loading" class="loading">Loading…</div>
      <div id="empty" class="empty" hidden>No albums in this collection yet.</div>
      <div id="sections" hidden>
        <section class="section">
          <div class="section-header">
            <h3 class="section-title">Listed</h3>
            <span class="section-count" id="listed-count"></span>
          </div>
          <div id="listed-grid" class="grid"></div>
          <div id="listed-empty" class="empty section-empty" hidden>No listed albums.</div>
        </section>
        <section class="section">
          <div class="section-header">
            <h3 class="section-title">Unlisted</h3>
            <span class="section-count" id="unlisted-count"></span>
          </div>
          <div id="unlisted-grid" class="grid"></div>
          <div id="unlisted-empty" class="empty section-empty" hidden>No unlisted albums.</div>
        </section>
      </div>
    </main>
  </div>

  <div id="modal-backdrop" class="modal-backdrop" role="dialog" aria-modal="true" aria-labelledby="modal-title">
    <div class="modal">
      <h2 id="modal-title">Add albums</h2>
      <fieldset class="visibility-choice">
        <legend>Add as</legend>
        <label><input type="radio" name="add-visibility" value="listed" checked> Listed</label>
        <label><input type="radio" name="add-visibility" value="unlisted"> Unlisted</label>
      </fieldset>
      <input id="modal-filter" class="modal-filter" type="text" placeholder="Filter by title…" autocomplete="off">
      <div id="modal-loading" class="modal-loading">Loading…</div>
      <div id="modal-empty" class="modal-empty" hidden>No albums found.</div>
      <ul id="modal-list" class="album-pick-list" hidden></ul>
      <div id="modal-error" class="modal-error"></div>
      <div class="modal-actions">
        <span class="count" id="modal-count">0 selected</span>
        <button type="button" class="cancel" id="modal-cancel">Cancel</button>
        <button type="button" class="submit" id="modal-submit" disabled>Add</button>
      </div>
    </div>
  </div>

  <script>
    const collectionId = decodeURIComponent(location.pathname.split("/").filter(Boolean).pop());
    const titleEl = document.getElementById("collection-title");
    const titleInput = document.getElementById("collection-title-input");
    const publicUrlEl = document.getElementById("public-url");

    let titleEditCancelled = false;

    function startEditTitle() {
      titleInput.value = titleEl.textContent;
      titleEl.style.display = "none";
      titleInput.style.display = "inline-block";
      titleInput.focus();
      titleInput.select();
    }
    async function saveTitle() {
      const newTitle = titleInput.value.trim();
      titleInput.style.display = "none";
      titleEl.style.display = "";
      if (!newTitle || newTitle === titleEl.textContent) return;
      try {
        const resp = await fetch(`/api/collections/${encodeURIComponent(collectionId)}/title`, {
          method: "PUT",
          headers: {"Content-Type": "application/json"},
          body: JSON.stringify({title: newTitle}),
        });
        if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
        const data = await resp.json();
        titleEl.textContent = data.title;
        document.title = `Collection · ${data.title}`;
      } catch (err) {
        statusEl.textContent = `Rename failed: ${err.message}`;
        setTimeout(() => { statusEl.textContent = ""; }, 4000);
      }
    }
    function cancelEditTitle() {
      titleEditCancelled = true;
      titleInput.style.display = "none";
      titleEl.style.display = "";
    }
    titleEl.addEventListener("click", startEditTitle);
    titleInput.addEventListener("keydown", (e) => {
      if (e.key === "Enter") { e.preventDefault(); saveTitle(); }
      else if (e.key === "Escape") cancelEditTitle();
    });
    titleInput.addEventListener("blur", () => {
      if (titleEditCancelled) { titleEditCancelled = false; return; }
      saveTitle();
    });
    const publicUrlLink = document.getElementById("public-url-link");
    const copyUrlBtn = document.getElementById("copy-url-btn");
    const sectionsEl = document.getElementById("sections");
    const listedGrid = document.getElementById("listed-grid");
    const unlistedGrid = document.getElementById("unlisted-grid");
    const listedEmpty = document.getElementById("listed-empty");
    const unlistedEmpty = document.getElementById("unlisted-empty");
    const listedCount = document.getElementById("listed-count");
    const unlistedCount = document.getElementById("unlisted-count");
    const empty = document.getElementById("empty");
    const loading = document.getElementById("loading");
    const statusEl = document.getElementById("status");
    const addBtn = document.getElementById("add-albums-btn");

    const selectCountEl = document.getElementById("select-count");
    const selectSectionLabel = document.getElementById("select-section-label");
    const actionPrimaryBtn = document.getElementById("action-primary-btn");
    const actionRemoveBtn = document.getElementById("action-remove-btn");
    const cancelSelectBtn = document.getElementById("cancel-select-btn");

    const backdrop = document.getElementById("modal-backdrop");
    const modalFilter = document.getElementById("modal-filter");
    const modalLoading = document.getElementById("modal-loading");
    const modalEmpty = document.getElementById("modal-empty");
    const modalList = document.getElementById("modal-list");
    const modalError = document.getElementById("modal-error");
    const modalCancel = document.getElementById("modal-cancel");
    const modalSubmit = document.getElementById("modal-submit");
    const modalCount = document.getElementById("modal-count");

    let memberAlbumIds = new Set();
    let pickerAlbums = [];
    let pickerSelected = new Set();

    let activeSection = null;
    const selected = new Set();

    function pluralize(n, word) { return `${n} ${word}${n === 1 ? "" : "s"}`; }

    function exitSelectMode() {
      activeSection = null;
      selected.clear();
      document.body.classList.remove("selecting");
      for (const card of document.querySelectorAll(".album-card.selected")) {
        card.classList.remove("selected");
      }
    }

    function updateSelectBar() {
      selectCountEl.textContent = selected.size;
      selectSectionLabel.textContent =
        activeSection === "listed" ? "in Listed" : "in Unlisted";
      actionPrimaryBtn.textContent =
        activeSection === "listed" ? "Unlist" : "List";
      actionPrimaryBtn.disabled = selected.size === 0;
      actionRemoveBtn.disabled = selected.size === 0;
    }

    function toggleSelection(albumId, section) {
      if (activeSection && activeSection !== section) {
        for (const card of document.querySelectorAll(".album-card.selected")) {
          card.classList.remove("selected");
        }
        selected.clear();
      }
      activeSection = section;
      const card = document.querySelector(
        `.album-card[data-album-id="${albumId}"][data-section="${section}"]`
      );
      if (selected.has(albumId)) {
        selected.delete(albumId);
        if (card) card.classList.remove("selected");
      } else {
        selected.add(albumId);
        if (card) card.classList.add("selected");
      }
      if (selected.size === 0) {
        exitSelectMode();
      } else {
        document.body.classList.add("selecting");
        updateSelectBar();
      }
    }

    function buildAlbumCard(album, section) {
      const card = document.createElement("div");
      card.className = "album-card";
      card.dataset.albumId = album.album_id;
      card.dataset.section = section;

      const link = document.createElement("a");
      link.href = `/album/${album.album_id}`;
      link.style.display = "contents";
      link.style.color = "inherit";
      link.style.textDecoration = "none";

      const cover = document.createElement("div");
      cover.className = "cover";
      if (album.cover_thumb_url) {
        const img = document.createElement("img");
        img.src = album.cover_thumb_url;
        img.alt = "";
        img.loading = "lazy";
        cover.appendChild(img);
      }
      link.appendChild(cover);

      const meta = document.createElement("div");
      meta.className = "album-meta";
      const title = document.createElement("div");
      title.className = "album-title";
      title.textContent = album.title || "(untitled)";
      title.title = album.title;
      meta.appendChild(title);
      const displayDate = album.event_date || album.created_at;
      if (displayDate) {
        const date = document.createElement("div");
        date.className = "album-meta-date";
        date.textContent = new Date(displayDate * 1000).toISOString().slice(0, 10);
        meta.appendChild(date);
      }
      link.appendChild(meta);
      card.appendChild(link);

      const radio = document.createElement("div");
      radio.className = "radio";
      radio.innerHTML = '<svg viewBox="0 0 16 16" fill="currentColor"><path d="M13.5 3.5L6 11l-3.5-3.5L1 9l5 5 9-9z"/></svg>';
      radio.addEventListener("click", (e) => {
        e.preventDefault();
        e.stopPropagation();
        toggleSelection(album.album_id, section);
      });
      card.appendChild(radio);

      link.addEventListener("click", (e) => {
        if (document.body.classList.contains("selecting")) {
          e.preventDefault();
          toggleSelection(album.album_id, section);
        }
      });

      return card;
    }

    function renderSection(gridEl, emptyEl, countEl, albums, section) {
      gridEl.innerHTML = "";
      countEl.textContent = albums.length ? `(${albums.length})` : "";
      if (!albums.length) {
        emptyEl.hidden = false;
        return;
      }
      emptyEl.hidden = true;
      for (const a of albums) gridEl.appendChild(buildAlbumCard(a, section));
    }

    async function fetchCollection() {
      const resp = await fetch(`/api/collections/${encodeURIComponent(collectionId)}`);
      if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
      return resp.json();
    }

    async function refresh() {
      exitSelectMode();
      try {
        const data = await fetchCollection();
        titleEl.textContent = data.title || "(untitled)";
        document.title = data.title ? `Collection · ${data.title}` : "Collection";
        if (data.public_url) {
          publicUrlEl.hidden = false;
          publicUrlLink.href = data.public_url;
          publicUrlLink.textContent = data.public_url;
        }
        const listed = data.listed_albums || [];
        const unlisted = data.unlisted_albums || [];
        memberAlbumIds = new Set(
          [...listed, ...unlisted].map(a => a.album_id)
        );
        loading.hidden = true;
        if (!listed.length && !unlisted.length) {
          empty.hidden = false;
          sectionsEl.hidden = true;
          return;
        }
        empty.hidden = true;
        sectionsEl.hidden = false;
        renderSection(listedGrid, listedEmpty, listedCount, listed, "listed");
        renderSection(unlistedGrid, unlistedEmpty, unlistedCount, unlisted, "unlisted");
      } catch (err) {
        loading.textContent = `Failed to load collection: ${err.message}`;
        loading.hidden = false;
      }
    }

    copyUrlBtn.addEventListener("click", async () => {
      try {
        await navigator.clipboard.writeText(publicUrlLink.href);
        statusEl.textContent = "Copied public link.";
        setTimeout(() => { statusEl.textContent = ""; }, 3000);
      } catch (_e) {
        statusEl.textContent = "Copy failed — select and copy manually.";
      }
    });

    cancelSelectBtn.addEventListener("click", exitSelectMode);
    document.addEventListener("keydown", (e) => {
      if (e.key === "Escape") {
        if (backdrop.classList.contains("visible")) closePicker();
        else if (document.body.classList.contains("selecting")) exitSelectMode();
      }
    });

    actionPrimaryBtn.addEventListener("click", async () => {
      if (selected.size === 0) return;
      const toVisibility = activeSection === "listed" ? "unlisted" : "listed";
      const ids = Array.from(selected);
      actionPrimaryBtn.disabled = true;
      actionRemoveBtn.disabled = true;
      try {
        for (const aid of ids) {
          const resp = await fetch(
            `/api/collections/${encodeURIComponent(collectionId)}/albums/${encodeURIComponent(aid)}/visibility`,
            {
              method: "PUT",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({ visibility: toVisibility }),
            }
          );
          if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
        }
        statusEl.textContent = `${pluralize(ids.length, "album")} moved to ${toVisibility}.`;
        setTimeout(() => { statusEl.textContent = ""; }, 4000);
        await refresh();
      } catch (err) {
        statusEl.textContent = `Update failed: ${err.message}`;
        updateSelectBar();
      }
    });

    actionRemoveBtn.addEventListener("click", async () => {
      if (selected.size === 0) return;
      const ids = Array.from(selected);
      if (!confirm(`Remove ${pluralize(ids.length, "album")} from this collection?`)) return;
      actionPrimaryBtn.disabled = true;
      actionRemoveBtn.disabled = true;
      try {
        for (const aid of ids) {
          const resp = await fetch(
            `/api/collections/${encodeURIComponent(collectionId)}/albums/${encodeURIComponent(aid)}`,
            { method: "DELETE" }
          );
          if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
        }
        statusEl.textContent = `Removed ${pluralize(ids.length, "album")}.`;
        setTimeout(() => { statusEl.textContent = ""; }, 4000);
        await refresh();
      } catch (err) {
        statusEl.textContent = `Remove failed: ${err.message}`;
        updateSelectBar();
      }
    });

    function renderPicker() {
      const filter = modalFilter.value.trim().toLowerCase();
      modalList.innerHTML = "";
      const visible = pickerAlbums.filter(a =>
        !filter || (a.title || "").toLowerCase().includes(filter)
      );
      if (!visible.length) {
        modalList.hidden = true;
        modalEmpty.hidden = false;
        return;
      }
      modalEmpty.hidden = true;
      modalList.hidden = false;
      for (const a of visible) {
        const li = document.createElement("li");
        li.className = "album-pick-row";
        const inCollection = memberAlbumIds.has(a.album_id);
        if (inCollection) li.classList.add("in-collection");

        const checkbox = document.createElement("input");
        checkbox.type = "checkbox";
        checkbox.disabled = inCollection;
        checkbox.checked = pickerSelected.has(a.album_id);
        checkbox.addEventListener("change", () => {
          if (checkbox.checked) pickerSelected.add(a.album_id);
          else pickerSelected.delete(a.album_id);
          updatePickerCount();
        });
        li.appendChild(checkbox);

        const cover = document.createElement("div");
        cover.className = "album-row-cover";
        if (a.cover_thumb_url) {
          const img = document.createElement("img");
          img.src = a.cover_thumb_url;
          img.alt = "";
          img.loading = "lazy";
          cover.appendChild(img);
        }
        li.appendChild(cover);

        const title = document.createElement("div");
        title.className = "album-pick-title";
        title.textContent = a.title || "(untitled)";
        title.title = a.title;
        li.appendChild(title);

        if (inCollection) {
          const tag = document.createElement("span");
          tag.className = "album-pick-tag";
          tag.textContent = "in collection";
          li.appendChild(tag);
        } else {
          li.addEventListener("click", (e) => {
            if (e.target.tagName !== "INPUT") {
              checkbox.checked = !checkbox.checked;
              checkbox.dispatchEvent(new Event("change"));
            }
          });
        }
        modalList.appendChild(li);
      }
    }

    function updatePickerCount() {
      const n = pickerSelected.size;
      modalCount.textContent = `${n} selected`;
      modalSubmit.disabled = n === 0;
    }

    async function openPicker() {
      modalError.textContent = "";
      modalFilter.value = "";
      pickerSelected = new Set();
      updatePickerCount();
      modalLoading.hidden = false;
      modalList.hidden = true;
      modalEmpty.hidden = true;
      backdrop.classList.add("visible");
      try {
        const resp = await fetch("/api/albums");
        if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
        const data = await resp.json();
        pickerAlbums = data.albums || [];
        modalLoading.hidden = true;
        renderPicker();
        modalFilter.focus();
      } catch (err) {
        modalLoading.hidden = true;
        modalError.textContent = `Failed to load albums: ${err.message}`;
      }
    }

    function closePicker() {
      backdrop.classList.remove("visible");
    }

    addBtn.addEventListener("click", openPicker);
    modalCancel.addEventListener("click", closePicker);
    backdrop.addEventListener("click", (e) => {
      if (e.target === backdrop) closePicker();
    });
    modalFilter.addEventListener("input", renderPicker);

    modalSubmit.addEventListener("click", async () => {
      const ids = Array.from(pickerSelected);
      if (!ids.length) return;
      const visibility = document.querySelector(
        'input[name="add-visibility"]:checked'
      )?.value || "listed";
      modalSubmit.disabled = true;
      modalError.textContent = "";
      try {
        const resp = await fetch(
          `/api/collections/${encodeURIComponent(collectionId)}/albums`,
          {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ album_ids: ids, visibility }),
          }
        );
        if (!resp.ok) {
          let detail = `HTTP ${resp.status}`;
          try {
            const data = await resp.json();
            if (data.detail) detail = data.detail;
          } catch (_e) {}
          throw new Error(detail);
        }
        const data = await resp.json();
        closePicker();
        statusEl.textContent = `Added ${pluralize(data.added, "album")} as ${visibility}.`;
        setTimeout(() => { statusEl.textContent = ""; }, 4000);
        refresh();
      } catch (err) {
        modalError.textContent = err.message;
        modalSubmit.disabled = false;
      }
    });

    refresh();
  </script>
  <script>
    (function () {
      var toggle = document.getElementById("drawer-toggle");
      if (!toggle) return;
      toggle.addEventListener("click", function () {
        var open = document.body.classList.toggle("drawer-open");
        toggle.setAttribute("aria-expanded", open ? "true" : "false");
        toggle.textContent = open ? "✕ Close" : "☰ Menu";
      });
    })();
  </script>
</body>
</html>
