<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Collections</title>
  <style>
    :root {
      --bg: #fafafa;
      --fg: #222;
      --muted: #888;
      --border: #e5e5e5;
      --card: #ffffff;
      --accent: #2266dd;
    }
    * { box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      margin: 0;
      background: var(--bg);
      color: var(--fg);
      display: flex;
      flex-direction: column;
      height: 100vh;
    }
    .top-header {
      flex: 0 0 auto;
      padding: 0.55rem 1.25rem;
      border-bottom: 1px solid var(--border);
      background: var(--card);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
    }
    .top-header h1 {
      margin: 0;
      font-size: 1.1rem;
      font-weight: 600;
      letter-spacing: -0.01em;
    }
    .top-header a.signout {
      color: var(--muted);
      font-size: 0.85rem;
      text-decoration: none;
    }
    .top-header a.signout:hover { color: var(--fg); text-decoration: underline; }

    .layout {
      flex: 1 1 auto;
      display: flex;
      min-height: 0;
    }
    .sidebar {
      flex: 0 0 220px;
      background: var(--card);
      border-right: 1px solid var(--border);
      padding: 1rem 0.75rem;
      display: flex;
      flex-direction: column;
      gap: 1.25rem;
      overflow-y: auto;
    }
    .sidebar-section { display: flex; flex-direction: column; gap: 0.2rem; }
    .nav-link {
      display: block;
      padding: 0.5rem 0.85rem;
      color: var(--muted);
      text-decoration: none;
      font-size: 0.9rem;
      border-radius: 6px;
    }
    .nav-link:hover { color: var(--fg); background: var(--bg); }
    .nav-link.active {
      color: var(--accent);
      background: rgba(34, 102, 221, 0.08);
    }

    .new-btn {
      display: block;
      width: 100%;
      padding: 0.5rem 0.85rem;
      background: var(--accent);
      color: white;
      border: none;
      border-radius: 6px;
      font-size: 0.9rem;
      font-weight: 500;
      cursor: pointer;
      font-family: inherit;
    }
    .new-btn:hover { filter: brightness(1.1); }
    .sidebar-filter {
      width: 100%;
      padding: 0.4rem 0.6rem;
      font-size: 0.85rem;
      border: 1px solid var(--border);
      border-radius: 6px;
      font-family: inherit;
    }
    .sidebar-filter:focus {
      outline: none;
      border-color: var(--accent);
    }
    .status {
      color: var(--muted);
      font-size: 0.85rem;
      padding: 0 0.1rem;
      word-break: break-word;
    }
    .status:empty { display: none; }

    main {
      flex: 1 1 auto;
      padding: 1.5rem 2rem;
      overflow-y: auto;
      min-height: 0;
    }

    .drawer-toggle {
      display: none;
      background: none;
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--fg);
      font-size: 0.9rem;
      padding: 0.3rem 0.6rem;
      cursor: pointer;
      font-family: inherit;
    }
    .drawer-toggle:hover { background: var(--bg); }

    @media (max-width: 720px) {
      .layout { flex-direction: column; }
      .sidebar {
        flex: 0 0 auto;
        border-right: none;
        border-bottom: 1px solid var(--border);
        display: none;
      }
      body.drawer-open .sidebar { display: flex; }
      .drawer-toggle { display: inline-block; }
      main { padding: 1.25rem; }
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 1rem;
    }
    .collection-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 1rem 1.1rem 1.1rem;
      display: flex;
      flex-direction: column;
      gap: 0.4rem;
      color: inherit;
      text-decoration: none;
    }
    .collection-card:hover { border-color: var(--accent); }
    .collection-title {
      font-size: 1rem;
      font-weight: 500;
      color: var(--fg);
      margin: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .collection-meta {
      font-size: 0.78rem;
      color: var(--muted);
      font-variant-numeric: tabular-nums;
    }

    .empty, .loading {
      color: var(--muted);
      font-style: italic;
      padding: 4rem 1rem;
      text-align: center;
    }

    .modal-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.35);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 200;
      visibility: hidden;
    }
    .modal-backdrop.visible { visibility: visible; }
    .modal {
      background: var(--card);
      border-radius: 8px;
      padding: 1.5rem;
      width: min(420px, 90vw);
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.15);
    }
    .modal h2 {
      margin: 0 0 1rem;
      font-size: 1.1rem;
      font-weight: 600;
    }
    .modal label {
      display: block;
      font-size: 0.85rem;
      color: var(--muted);
      margin-bottom: 0.35rem;
    }
    .modal input[type="text"] {
      width: 100%;
      padding: 0.5rem 0.65rem;
      font-size: 0.95rem;
      border: 1px solid var(--border);
      border-radius: 6px;
      font-family: inherit;
    }
    .modal input[type="text"]:focus {
      outline: none;
      border-color: var(--accent);
    }
    .modal-error {
      margin-top: 0.5rem;
      color: #b03030;
      font-size: 0.85rem;
      min-height: 1em;
    }
    .modal-actions {
      margin-top: 1.25rem;
      display: flex;
      justify-content: flex-end;
      gap: 0.5rem;
    }
    .modal-actions button {
      padding: 0.45rem 1rem;
      font-size: 0.9rem;
      border-radius: 6px;
      cursor: pointer;
      font-family: inherit;
    }
    .modal-actions .cancel {
      background: var(--card);
      border: 1px solid var(--border);
      color: var(--fg);
    }
    .modal-actions .cancel:hover { background: var(--bg); }
    .modal-actions .submit {
      background: var(--accent);
      color: white;
      border: none;
    }
    .modal-actions .submit:hover { filter: brightness(1.1); }
    .modal-actions .submit:disabled {
      filter: grayscale(0.5);
      cursor: not-allowed;
    }
  </style>
</head>
<body>
  <header class="top-header">
    <button type="button" class="drawer-toggle" id="drawer-toggle" aria-expanded="false" aria-controls="sidebar">☰ Menu</button>
    <h1>Your Photographs</h1>
    <a class="signout" href="/logout">Sign out</a>
  </header>
  <div class="layout">
    <aside class="sidebar" id="sidebar">
      <nav class="sidebar-section">
        <a class="nav-link" href="/">All Photos</a>
        <a class="nav-link" href="/albums">Albums</a>
        <a class="nav-link active" href="/collections">Collections</a>
      </nav>
      <div class="sidebar-section">
        <input id="filter-input" class="sidebar-filter" type="search" placeholder="Filter collections…" autocomplete="off">
      </div>
      <div class="sidebar-section">
        <button id="new-collection-btn" class="new-btn" type="button">New collection</button>
      </div>
      <div id="status" class="status sidebar-section"></div>
    </aside>
    <main>
      <div id="grid" class="grid" hidden></div>
      <div id="empty" class="empty" hidden>No collections yet.</div>
      <div id="loading" class="loading">Loading…</div>
    </main>
  </div>

  <div id="modal-backdrop" class="modal-backdrop" role="dialog" aria-modal="true" aria-labelledby="modal-title">
    <form id="new-collection-form" class="modal">
      <h2 id="modal-title">New collection</h2>
      <label for="collection-title">Title</label>
      <input id="collection-title" name="title" type="text" maxlength="200" required autocomplete="off">
      <div id="modal-error" class="modal-error"></div>
      <div class="modal-actions">
        <button type="button" class="cancel" id="cancel-btn">Cancel</button>
        <button type="submit" class="submit" id="submit-btn">Create</button>
      </div>
    </form>
  </div>

  <script>
    const newBtn = document.getElementById("new-collection-btn");
    const backdrop = document.getElementById("modal-backdrop");
    const form = document.getElementById("new-collection-form");
    const titleInput = document.getElementById("collection-title");
    const errorEl = document.getElementById("modal-error");
    const cancelBtn = document.getElementById("cancel-btn");
    const submitBtn = document.getElementById("submit-btn");
    const statusEl = document.getElementById("status");
    const grid = document.getElementById("grid");
    const empty = document.getElementById("empty");
    const loading = document.getElementById("loading");

    function pluralize(n, word) {
      return `${n} ${word}${n === 1 ? "" : "s"}`;
    }

    function buildCollectionCard(collection) {
      const card = document.createElement("a");
      card.className = "collection-card";
      card.href = `/collection/${collection.collection_id}`;

      const title = document.createElement("h3");
      title.className = "collection-title";
      title.textContent = collection.title;
      title.title = collection.title;
      card.appendChild(title);

      const meta = document.createElement("div");
      meta.className = "collection-meta";
      meta.textContent = pluralize(collection.album_count ?? 0, "album");
      card.appendChild(meta);

      return card;
    }

    const filterInput = document.getElementById("filter-input");
    let allCollections = [];

    function renderCollections(collections, filtering = false) {
      grid.innerHTML = "";
      loading.hidden = true;
      if (!collections.length) {
        empty.textContent = filtering ? "No collections match that filter." : "No collections yet.";
        empty.hidden = false;
        grid.hidden = true;
        return;
      }
      empty.hidden = true;
      grid.hidden = false;
      for (const c of collections) grid.appendChild(buildCollectionCard(c));
    }

    function applyFilter() {
      const q = filterInput.value.trim().toLowerCase();
      const filtered = q
        ? allCollections.filter(c => (c.title || "").toLowerCase().includes(q))
        : allCollections;
      renderCollections(filtered, !!q);
    }

    async function fetchCollections() {
      const resp = await fetch("/api/collections");
      if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
      const data = await resp.json();
      return data.collections || [];
    }

    async function refreshGrid() {
      try {
        allCollections = await fetchCollections();
        applyFilter();
      } catch (err) {
        loading.textContent = `Failed to load collections: ${err.message}`;
        loading.hidden = false;
      }
    }

    filterInput.addEventListener("input", applyFilter);

    refreshGrid();

    function openModal() {
      errorEl.textContent = "";
      titleInput.value = "";
      submitBtn.disabled = false;
      backdrop.classList.add("visible");
      titleInput.focus();
    }
    function closeModal() {
      backdrop.classList.remove("visible");
    }

    newBtn.addEventListener("click", openModal);
    cancelBtn.addEventListener("click", closeModal);
    backdrop.addEventListener("click", (e) => {
      if (e.target === backdrop) closeModal();
    });
    document.addEventListener("keydown", (e) => {
      if (e.key === "Escape" && backdrop.classList.contains("visible")) closeModal();
    });

    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      const title = titleInput.value.trim();
      if (!title) {
        errorEl.textContent = "Title is required.";
        return;
      }
      submitBtn.disabled = true;
      errorEl.textContent = "";
      try {
        const resp = await fetch("/api/collections", {
          method: "POST",
          headers: {"Content-Type": "application/json"},
          body: JSON.stringify({title}),
        });
        if (!resp.ok) {
          let detail = `HTTP ${resp.status}`;
          try {
            const data = await resp.json();
            if (data.detail) detail = data.detail;
          } catch (_e) {}
          throw new Error(detail);
        }
        const data = await resp.json();
        closeModal();
        statusEl.textContent = `Created “${data.title}”.`;
        setTimeout(() => { statusEl.textContent = ""; }, 4000);
        refreshGrid();
      } catch (err) {
        errorEl.textContent = err.message;
        submitBtn.disabled = false;
      }
    });
  </script>
  <script>
    (function () {
      var toggle = document.getElementById("drawer-toggle");
      if (!toggle) return;
      toggle.addEventListener("click", function () {
        var open = document.body.classList.toggle("drawer-open");
        toggle.setAttribute("aria-expanded", open ? "true" : "false");
        toggle.textContent = open ? "✕ Close" : "☰ Menu";
      });
    })();
  </script>
</body>
</html>
